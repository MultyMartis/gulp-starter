<div class="modal" id="@@id" aria-hidden="true">
    <div class="modal__overlay" data-modal-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="@@id-title">
        <button class="modal__close" type="button" data-modal-close aria-label="Close modal">x</button>
        <h3 class="modal__title" id="@@id-title">@@title</h3>
        <p class="modal__text">@@text</p>
    </div>
</div>
