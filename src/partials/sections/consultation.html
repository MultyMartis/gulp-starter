<section class="consultation" aria-labelledby="consultation-title">
    <div class="consultation__container">
        <div class="consultation__inner">
            <div class="consultation__media" aria-hidden="true">
                <img
                    class="consultation__image"
                    src="assets/design/barel/images/manufacturing-step-06.jpg"
                    alt=""
                    width="1600"
                    height="1200"
                    loading="lazy"
                    decoding="async"
                >
            </div>
            <div class="consultation__scrim" aria-hidden="true"></div>
            <div class="consultation__panel">
                <h2 class="consultation__title" id="consultation-title">Получить консультацию</h2>
                <p class="consultation__lead">Оставьте заявку, и наш специалист свяжется с вами в течение 15 минут</p>

                <form class="consultation__form">
                    <div class="consultation__fields">
                        <div class="consultation__field">
                            <input
                                class="consultation__input"
                                type="text"
                                name="name"
                                id="consultation-name"
                                placeholder="Имя"
                                autocomplete="name"
                                aria-label="Имя"
                            >
                        </div>
                        <div class="consultation__field">
                            <input
                                class="consultation__input"
                                type="tel"
                                name="phone"
                                id="consultation-phone"
                                placeholder="+7 (___) ___-__-__"
                                autocomplete="tel"
                                inputmode="tel"
                                aria-label="Телефон"
                            >
                        </div>
                        <div class="consultation__field">
                            <textarea
                                class="consultation__textarea"
                                name="message"
                                id="consultation-message"
                                rows="4"
                                placeholder="Ваш вопрос"
                                aria-label="Ваш вопрос"
                            ></textarea>
                        </div>
                    </div>
                    <button class="consultation__button" type="button">Отправить заявку</button>
                    <p class="consultation__note">Нажимая на кнопку, вы даете согласие на обработку персональных данных</p>
                </form>
            </div>
        </div>
    </div>
</section>
